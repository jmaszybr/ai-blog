name: Daily AI Post
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "Brak pliku package.json, pomijam instalację."
          fi

      - name: Generate post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLIPDROP_API_KEY: ${{ secrets.CLIPDROP_API_KEY }}
        run: node scripts/generate_post.js

      - name: Commit and push changes
        run: |
          git config --global user.name "ai-blog-bot"
          git config --global user.email "action@github.com"
          git add posts/ posts_index.json topics.json
          if git diff --staged --quiet; then
            echo "Brak zmian do zapisania."
          else
            git commit -m "🤖 Auto-generacja posta: $(date +'%Y-%m-%d')"
            git push
          fi
