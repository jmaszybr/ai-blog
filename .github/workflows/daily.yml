name: Generate AI Draft

on:
  schedule:
    # Codziennie o 06:00 UTC
    # W Polsce to zwykle 07:00 zimą albo 08:00 latem
    - cron: "0 6 * * *"

  # Pozwala uruchomić workflow ręcznie z zakładki Actions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-draft:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "Brak pliku package.json, pomijam instalację."
          fi

      - name: Ensure required folders and files exist
        run: |
          mkdir -p posts/drafts
          mkdir -p posts/images
          mkdir -p prompts
          mkdir -p data

          if [ ! -f data/pending_posts.json ]; then
            echo "[]" > data/pending_posts.json
          fi

          if [ ! -f data/rejected_posts.json ]; then
            echo "[]" > data/rejected_posts.json
          fi

      - name: Generate draft
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate_post.js --draft

      - name: Commit and push draft
        run: |
          git config --global user.name "ai-blog-bot"
          git config --global user.email "action@github.com"

          git add posts/drafts/ posts/images/ prompts/ data/pending_posts.json data/rejected_posts.json topics.json

          if git diff --staged --quiet; then
            echo "Brak zmian do zapisania."
          else
            git commit -m "📝 Szkic AI: $(date +'%Y-%m-%d')"
            git push
          fi
