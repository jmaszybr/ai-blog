name: Daily AI Post
on:
  schedule:
    # Uruchamia skrypt codziennie o 06:00 UTC (ok. 7:00/8:00 rano w Polsce)
    - cron: "0 6 * * *"
  # Pozwala na ręczne uruchomienie przyciskiem w zakładce Actions
  workflow_dispatch:
# Nadaje uprawnienia do zapisu zmian w repozytorium (kluczowe dla "git push")
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Pobranie kodu repozytorium
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # 2. Instalacja środowiska Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      # 3. Instalacja zależności (jeśli używasz zewnętrznych paczek)
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "Brak pliku package.json, pomijam instalację."
          fi
      # 4. Generowanie posta
      # Krok tymczasowy - pokaże gdzie leżą pliki JS/MJS
      - name: Debug - znajdź skrypt
        run: find . -name "*.mjs" -o -name "*.js" | grep -v node_modules

      - name: Generate post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLIPDROP_API_KEY: ${{ secrets.CLIPDROP_API_KEY }}
        run: node generate-post.mjs
      # 5. Zapisanie zmian z powrotem w repozytorium
      - name: Commit and push changes
        run: |
          git config --global user.name "ai-blog-bot"
          git config --global user.email "action@github.com"
          git add posts/ posts_index.json topics.json
          if git diff --staged --quiet; then
            echo "Brak zmian do zapisania."
          else
            git commit -m "🤖 Auto-generacja posta: $(date +'%Y-%m-%d')"
            git push
          fi
